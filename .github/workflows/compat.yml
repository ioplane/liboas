name: OAS Compatibility

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  style-validator:
    name: OpenAPI Style Validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download style validator
        run: |
          curl -sL -o openapi-style-validator.jar \
            "https://repo1.maven.org/maven2/org/openapitools/openapi-style-validator-cli/1.11/openapi-style-validator-cli-1.11-all.jar"

      - name: Validate petstore fixture
        run: |
          java -jar openapi-style-validator.jar \
            -s tests/fixtures/petstore.json \
            -vn operationId \
            -vn operationTag \
            -vo true \
            || echo "::warning::Style validation found issues"

  openapi-generator:
    name: OpenAPI Generator Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download openapi-generator
        run: |
          curl -sL -o openapi-generator-cli.jar \
            "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.12.0/openapi-generator-cli-7.12.0.jar"

      - name: Validate petstore spec
        run: |
          java -jar openapi-generator-cli.jar validate \
            -i tests/fixtures/petstore.json

      - name: Generate C client (smoke test)
        run: |
          java -jar openapi-generator-cli.jar generate \
            -i tests/fixtures/petstore.json \
            -g c \
            -o /tmp/generated-c-client \
            --skip-validate-spec
          echo "Generated files:"
          find /tmp/generated-c-client -name "*.c" -o -name "*.h" | head -20
